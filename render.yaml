# Render Blueprint — один web-сервіс (Express + зібраний React) + PostgreSQL
databases:
  - name: biz-finance-db
    plan: free
    databaseName: biz_finance
    user: biz

services:
  - type: web
    name: biz-finance
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biz-finance-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: BASE_CURRENCY
        value: UAH
      - key: NBU_ENABLED
        value: "true"
      - key: OWNER_EMAIL
        value: owner@biz.local
      # Пароль власника — задається вручну при першому деплої (не зберігається в репо)
      - key: OWNER_PASSWORD
        sync: false
